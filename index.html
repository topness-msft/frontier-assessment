<title>Frontier Transformation Readiness Assessment</title>

<script src="patterns.js"></script>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e1117;
  --surface: #161b22;
  --elevated: #1c2333;
  --border: #2a3040;
  --border-bright: #3d4a5c;
  --text: #e6edf3;
  --text-sec: #8b949e;
  --text-dim: #656d76;
  --blue: #4393e5;
  --blue-dim: rgba(67,147,229,0.12);
  --amber: #e8a735;
  --amber-dim: rgba(232,167,53,0.12);
  --light: #f0f0f0;
  --pink: #e56b9a;
  --pink-dim: rgba(229,107,154,0.12);
  --green: #00d4aa;
  --orange: #ff9f43;
  --radius: 10px;
  --radius-sm: 6px;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-heading: 'DM Sans', system-ui, sans-serif;
}

/* ---- Light mode overrides ---- */
.light-mode {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --elevated: #f0f1f4;
  --border: #d8dce3;
  --border-bright: #b8bfc9;
  --text: #1a1d24;
  --text-sec: #505862;
  --text-dim: #808890;
  --blue: #2b6ec2;
  --blue-dim: rgba(43,110,194,0.10);
  --amber: #b8860b;
  --amber-dim: rgba(184,134,11,0.10);
  --light: #2a2d35;
  --pink: #c44d74;
  --pink-dim: rgba(196,77,116,0.10);
  --green: #00967a;
  --orange: #d07a20;
}

html { scroll-behavior: smooth; }
html, body { transition: background-color 0.3s ease, color 0.3s ease; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   LAYOUT
   ============================================================ */
#app {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

header {
  padding: 32px 0 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* Theme toggle */
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-sec);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.theme-toggle:hover { border-color: var(--text-sec); color: var(--text); }
.theme-toggle-icon { font-size: 1rem; line-height: 1; }

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font-heading);
  font-size: 1.35rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}

.logo img {
  height: 32px;
  width: auto;
}

.logo span { color: var(--blue); }

/* ============================================================
   PHASE INDICATOR
   ============================================================ */
.steps {
  display: flex;
  align-items: center;
  gap: 0;
}

.step {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-dim);
  transition: color 0.3s;
}

.step-num {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.78rem;
  font-weight: 700;
  border: 2px solid var(--border);
  color: var(--text-dim);
  transition: all 0.3s;
  flex-shrink: 0;
}

.step.active .step-num {
  border-color: var(--blue);
  background: var(--blue);
  color: #fff;
}
.step.active { color: var(--text); }

.step.done .step-num {
  border-color: var(--blue);
  background: transparent;
  color: var(--blue);
}
.step.done { color: var(--text-sec); }

.step-line {
  width: 40px;
  height: 2px;
  background: var(--border);
  margin: 0 8px;
  flex-shrink: 0;
  transition: background 0.3s;
}
.step-line.done { background: var(--blue); }

/* ============================================================
   CONTENT TRANSITIONS
   ============================================================ */
#content {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
#content.fade-out {
  opacity: 0;
  transform: translateY(12px);
}

/* ============================================================
   SHARED COMPONENTS
   ============================================================ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

.section-title {
  font-family: var(--font-heading);
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.02em;
  line-height: 1.3;
}

.section-sub {
  font-size: 0.95rem;
  color: var(--text-sec);
  margin-bottom: 28px;
  line-height: 1.6;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--blue);
  color: #fff;
}
.btn-primary:hover { background: #5aa3f0; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-ghost {
  background: transparent;
  color: var(--text-sec);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--text-sec); color: var(--text); }

/* ============================================================
   PHASE 1: DECISION TREE
   ============================================================ */
.dt-question {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 24px;
  line-height: 1.35;
}

.dt-options { display: flex; flex-direction: column; gap: 10px; }

.dt-opt {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  cursor: pointer;
  font-size: 0.95rem;
  color: var(--text);
  transition: all 0.2s;
  text-align: left;
  line-height: 1.5;
}
.dt-opt:hover {
  border-color: var(--blue);
  background: var(--blue-dim);
  transform: translateX(4px);
}

.dt-opt {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
}
.dt-opt-text { flex: 1; }
.dt-opt-info {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text-dim);
  background: var(--elevated);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  z-index: 2;
}
.dt-opt-info:hover {
  color: var(--blue);
  border-color: var(--blue);
  background: var(--blue-dim);
}
.dt-flyout {
  position: absolute;
  left: calc(100% + 12px);
  top: 50%;
  transform: translateY(-50%);
  width: 320px;
  background: var(--elevated);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius);
  padding: 16px 18px;
  z-index: 50;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: fadeUp 0.2s ease-out;
  display: none;
}
.dt-flyout.visible { display: block; }
.dt-flyout-title {
  font-weight: 600;
  font-size: 0.82rem;
  color: var(--text);
  margin-bottom: 8px;
}
.dt-flyout-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.dt-flyout-list li {
  font-size: 0.8rem;
  color: var(--text-sec);
  line-height: 1.4;
  padding-left: 14px;
  position: relative;
}
.dt-flyout-list li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--text-dim);
}

/* Back arrow for Phase 3 */
.q-back {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.85rem;
  color: var(--text-dim);
  cursor: pointer;
  transition: color 0.2s;
  text-decoration: none;
  border: none;
  background: none;
  font-family: var(--font-body);
  padding: 0;
}
.q-back:hover { color: var(--text-sec); }

/* ============================================================
   PHASE 2: SCENARIO + PATTERN SELECT
   ============================================================ */
.scenario-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid var(--blue);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 32px;
}
.scenario-card .pattern-name {
  font-family: var(--font-heading);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--blue);
  margin-bottom: 12px;
}
.scenario-card .vignette {
  font-size: 0.95rem;
  color: var(--text-sec);
  line-height: 1.7;
  font-style: italic;
}

.pattern-group {
  margin-bottom: 28px;
}
.pattern-group-label {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-sec);
  margin-bottom: 12px;
}

.pattern-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.pattern-chip {
  padding: 10px 18px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-sec);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.pattern-chip:hover {
  border-color: var(--text-sec);
  color: var(--text);
}
.pattern-chip.selected {
  border-color: var(--blue);
  background: var(--blue-dim);
  color: var(--blue);
}

/* VIGNETTE SELECTION CARDS */
.vignette-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.vignette-card {
  padding: 16px 20px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.vignette-card:hover {
  border-color: var(--text-sec);
  background: var(--elevated);
}
.vignette-card.selected {
  border-color: var(--blue);
  background: var(--blue-dim);
}
.vignette-card .vc-story {
  font-size: 0.9rem;
  color: var(--text-sec);
  line-height: 1.5;
}
.vignette-card.selected .vc-story {
  color: var(--text);
}
.vignette-card.not-started {
  border-style: dashed;
}
.vignette-card.not-started .vc-story {
  font-style: italic;
}

/* ============================================================
   PHASE 3: ASSESSMENT
   ============================================================ */
.progress-wrap {
  margin-bottom: 32px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-count {
  font-size: 0.82rem;
  color: var(--text-sec);
  font-weight: 500;
}
.pillar-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 14px;
  border-radius: 100px;
  background: var(--blue-dim);
  color: var(--blue);
  font-size: 0.78rem;
  font-weight: 600;
}
.pillar-badge::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--blue);
}

.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 4px;
  transition: width 0.4s ease;
}

/* CONVERGENCE BARS — RIGHT SIDEBAR */
.conv-sidebar {
  position: fixed;
  top: 50%;
  right: max(24px, calc(50% - 560px));
  transform: translateY(-50%);
  width: 200px;
  padding: 12px 8px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
  z-index: 50;
  overflow: visible;
}
.conv-sidebar.visible {
  opacity: 1;
  pointer-events: auto;
}
.conv-sidebar-title {
  font-size: 0.55rem;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  padding-left: 58px;
}
.conv-strip {
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow: visible;
}
.conv-scale {
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 6px;
  margin-bottom: 2px;
}
.conv-scale-track {
  position: relative;
  height: 12px;
}
.conv-scale-track span {
  position: absolute;
  transform: translateX(-50%);
  font-size: 0.5rem;
  font-weight: 600;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}
.conv-row {
  display: grid;
  grid-template-columns: 52px 1fr;
  align-items: center;
  gap: 6px;
  height: 18px;
  overflow: visible;
}
.conv-pillar {
  font-size: 0.62rem;
  font-weight: 600;
  color: var(--text-dim);
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.3s;
}
.conv-pillar.answered { color: var(--text-sec); }
.conv-pillar.active-p { color: var(--blue); }
.conv-row.active-row {
  background: var(--blue-dim);
  border-radius: 3px;
  margin: 0 -4px;
  padding: 0 4px;
}
.conv-track {
  position: relative;
  height: 12px;
  background: var(--elevated);
  border-radius: 2px;
  overflow: visible;
  margin: 0 6px;
}
.conv-range {
  position: absolute;
  top: 1px; bottom: 1px;
  border-radius: 1px;
  transition: left 0.5s ease, width 0.5s ease, background 0.5s ease;
}
.conv-range.unknown {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
}
.conv-range.narrowing {
  background: var(--blue-dim);
  border: 1px solid rgba(67,147,229,0.2);
}
.conv-range.locked {
  background: transparent;
  border: none;
  width: 0 !important;
}
.conv-dot {
  position: absolute;
  top: 50%;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--blue);
  transform: translate(-50%, -50%);
  transition: left 0.5s ease, opacity 0.4s;
  z-index: 3;
}
.conv-target {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--amber);
  opacity: 0.4;
  z-index: 2;
}

@media (max-width: 1100px) {
  .conv-sidebar { display: none; }
}

.q-text {
  font-family: var(--font-heading);
  font-size: 1.35rem;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 24px;
  letter-spacing: -0.01em;
}

.options-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }

.opt-card {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid transparent;
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.92rem;
  color: var(--text-sec);
  line-height: 1.55;
}
.opt-card:hover {
  border-color: var(--border-bright);
  border-left-color: var(--border-bright);
  background: var(--elevated);
  color: var(--text);
}
.opt-card.selected {
  border-color: var(--blue);
  border-left-color: var(--blue);
  background: var(--blue-dim);
  color: var(--text);
}

.opt-marker {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  margin-top: 2px;
  transition: all 0.2s;
  position: relative;
}
.opt-card.selected .opt-marker {
  border-color: var(--blue);
}
.opt-card.selected .opt-marker::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--blue);
}

.q-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ============================================================
   PHASE 4: RESULTS
   ============================================================ */
.results-header {
  text-align: center;
  margin-bottom: 40px;
}
.results-header .section-title {
  font-size: 2rem;
  margin-bottom: 4px;
}
.overall-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  border-radius: 100px;
  background: var(--blue-dim);
  color: var(--blue);
  font-size: 1rem;
  font-weight: 600;
  margin-top: 12px;
}
.overall-badge .level-num {
  font-family: var(--font-heading);
  font-size: 1.4rem;
  font-weight: 700;
}

.result-section {
  margin-bottom: 48px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.5s ease forwards;
}
.result-section:nth-child(2) { animation-delay: 0.1s; }
.result-section:nth-child(3) { animation-delay: 0.2s; }
.result-section:nth-child(4) { animation-delay: 0.3s; }
.result-section:nth-child(5) { animation-delay: 0.4s; }

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

.result-section h2 {
  font-family: var(--font-heading);
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text);
}

/* JOURNEY LADDER */
.ladder-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  overflow-x: auto;
}
.ladder-wrap svg { display: block; margin: 0 auto; }

.ladder-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  color: var(--text-sec);
}
.legend-item svg { flex-shrink: 0; }

/* RADAR CHART */
.radar-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 520px;
  margin: 0 auto;
}

/* GAP TABLE */
.gap-list { display: flex; flex-direction: column; gap: 10px; }

.gap-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 16px;
  align-items: start;
}

.gap-status {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
}
.gap-status.on-track { background: var(--blue); }
.gap-status.caution { background: var(--amber); }
.gap-status.attention { background: var(--pink); }

.gap-status.on-track::after,
.gap-status.caution::after,
.gap-status.attention::after {
  content: '';
  display: block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.gap-detail { min-width: 0; }
.gap-pillar {
  font-weight: 600;
  font-size: 0.92rem;
  margin-bottom: 4px;
}
.gap-bar-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.gap-bar-track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 6px;
  position: relative;
  overflow: visible;
}
.gap-bar-current {
  height: 100%;
  border-radius: 6px;
  background: var(--blue);
  position: relative;
}
.gap-bar-target {
  position: absolute;
  top: -3px;
  width: 2px;
  height: 12px;
  background: var(--light);
  border-radius: 1px;
}
.gap-levels {
  font-size: 0.78rem;
  color: var(--text-dim);

/* ============================================================
   ADAPTIVE ENGINE
   ============================================================ */
class AdaptiveEngine {
  static pillars = pillars;

  constructor(questions, patternTargets, aspirationalPatternId) {
    this._allQuestions = questions;
    this._patternTargets = patternTargets;
    this._patternId = aspirationalPatternId;
    const pattern = patternTargets[aspirationalPatternId];
    if (!pattern) throw new Error('Unknown pattern ID: ' + aspirationalPatternId);
    this._targets = pattern.targets; // 5-element array indexed 0-4 for pillar IDs 1-5

    this._questionById = new Map(questions.map(q => [q.id, q]));

    // Separate pillar questions (1-5) from RAI questions (0)
    this._anchorByPillar = new Map();
    this._refinementByPillar = new Map();
    this._raiQuestions = [];

    for (const q of questions) {
      if (q.pillarId === 0) {
        this._raiQuestions.push(q);
        continue;
      }
      if (q.isAnchor) {
        this._anchorByPillar.set(q.pillarId, q);
      } else {
        if (!this._refinementByPillar.has(q.pillarId)) this._refinementByPillar.set(q.pillarId, []);
        this._refinementByPillar.get(q.pillarId).push(q);
      }
    }

    // Determine which pillars to skip (target === 100)
    this._skippedPillars = new Set();
    for (let i = 0; i < this._targets.length; i++) {
      if (this._targets[i] === 100) this._skippedPillars.add(i + 1);
    }

    // Build anchor queue from pillar IDs 1-5
    this._queue = [];
    for (let pid = 1; pid <= 5; pid++) {
      if (this._skippedPillars.has(pid) || !this._anchorByPillar.has(pid)) continue;
      this._queue.push(this._anchorByPillar.get(pid).id);
    }

    this._phase = this._queue.length > 0 ? 'anchors' : 'complete';
    this._answers = new Map();
    this._answerHistory = []; // ordered list of questionIds for undo
    this._pillarsNeedingRefinement = [];
    this._totalQuestions = this._queue.length;
    this._raiQueued = false;

    // Track answers per pillar ID (1-5 for pillars, 0 for RAI)
    this._pillarLevels = new Map();
    for (const pid of this._skippedPillars) this._pillarLevels.set(pid, [100]);

    this._justTransitioned = false;
  }

  getNextQuestion() {
    if (this._phase === 'complete' || this._queue.length === 0) return null;
    return this._questionById.get(this._queue[0]) || null;
  }

  recordAnswer(questionId, selectedLevel) {
    const wasNew = !this._answers.has(questionId);
    this._answers.set(questionId, selectedLevel);
    if (wasNew) this._answerHistory.push(questionId);
    const question = this._questionById.get(questionId);
    if (question) {
      if (!this._pillarLevels.has(question.pillarId)) this._pillarLevels.set(question.pillarId, []);
      const levels = this._pillarLevels.get(question.pillarId);
      if (wasNew) {
        levels.push(selectedLevel);
      } else {
        const qsForPillar = this._allQuestions.filter(q => q.pillarId === question.pillarId);
        const qIdx = qsForPillar.indexOf(question);
        if (qIdx >= 0 && qIdx < levels.length) levels[qIdx] = selectedLevel;
      }
    }
    if (this._queue.length > 0 && this._queue[0] === questionId) this._queue.shift();
    this._justTransitioned = false;
    if (this._phase === 'anchors' && this._queue.length === 0) {
      this._evaluateRefinement();
      if (this._phase === 'refinement') this._justTransitioned = true;
    }
    if (this._phase === 'refinement' && this._queue.length === 0) this._phase = 'complete';
  }

  didJustTransition() { return this._justTransitioned; }
  clearTransition() { return this._justTransitioned = false; }

  canUndo() { return this._answerHistory.length > 0; }

  undoLastAnswer() {
    if (this._answerHistory.length === 0) return;
    const lastQId = this._answerHistory.pop();
    const question = this._questionById.get(lastQId);

    // Remove from answers map
    this._answers.delete(lastQId);

    // Remove from pillar levels
    if (question) {
      const levels = this._pillarLevels.get(question.pillarId);
      if (levels && levels.length > 0) levels.pop();
      if (levels && levels.length === 0) this._pillarLevels.delete(question.pillarId);
    }

    // Put this question back at the front of the queue
    this._queue.unshift(lastQId);

    // Reset phase if we were in refinement/complete and the undone question was an anchor
    if (question && question.isAnchor && this._phase !== 'anchors') {
      this._phase = 'anchors';
      // Re-filter queue to only contain anchors (refinement questions get re-evaluated)
      this._queue = this._queue.filter(qid => {
        const q = this._questionById.get(qid);
        return q && q.isAnchor;
      });
      if (this._queue[0] !== lastQId) this._queue.unshift(lastQId);
      this._pillarsNeedingRefinement = [];
      this._raiQueued = false;
    }

    // If we undid an RAI question, un-mark RAI as queued if no RAI questions remain answered
    if (question && question.pillarId === 0) {
      const raiAnswered = this._raiQuestions.some(rq => this._answers.has(rq.id));
      if (!raiAnswered) this._raiQueued = false;
    }

    if (this._phase === 'complete') this._phase = 'refinement';
    this._justTransitioned = false;
    this._totalQuestions = Math.max(this._totalQuestions, this._answers.size + this._queue.length);
  }

  getProgress() {
    const answered = this._answers.size;
    const total = this._totalQuestions;
    const nextQ = this.getNextQuestion();
    let currentPillar = null;
    if (nextQ) {
      if (nextQ.pillarId === 0) {
        currentPillar = { id: 0, name: "Responsible AI & Trust", short: "RAI" };
      } else {
        currentPillar = pillars.find(p => p.id === nextQ.pillarId) || null;
      }
    }
    return { phase: this._phase, answered, total, currentPillar,
      percentComplete: total > 0 ? Math.round((answered / total) * 100) : 100 };
  }

  // Direct 5-pillar scoring with 70% avg + 30% min (weakest-link bias)
  getScores() {
    const scores = {};
    for (const p of pillars) {
      const levels = this._pillarLevels.get(p.id);
      if (!levels || levels.length === 0) { scores[p.id] = 100; continue; }
      if (levels.length === 1) { scores[p.id] = levels[0]; continue; }
      const avg = levels.reduce((a, b) => a + b, 0) / levels.length;
      const min = Math.min(...levels);
      scores[p.id] = roundTo50(avg * 0.7 + min * 0.3);
    }
    return scores;
  }

  // RAI score: average of RAI question answers (100-500), or null if unanswered
  getRaiScore() {
    const raiLevels = this._pillarLevels.get(0);
    if (!raiLevels || raiLevels.length === 0) return null;
    const avg = raiLevels.reduce((a, b) => a + b, 0) / raiLevels.length;
    return roundTo50(avg);
  }

  isComplete() { return this._phase === 'complete'; }

  getPillarBrackets() {
    const brackets = {};
    for (const p of pillars) {
      const levels = this._pillarLevels.get(p.id);
      const isSkipped = this._skippedPillars.has(p.id);
      if (isSkipped) { brackets[p.id] = { score: 100, lo: 100, hi: 100, status: 'done' }; continue; }
      if (!levels || levels.length === 0) { brackets[p.id] = { score: null, lo: 100, hi: 500, status: 'unknown' }; continue; }
      const avg = levels.reduce((a, b) => a + b, 0) / levels.length;
      const score = roundTo50(avg);
      const needsRefinement = this._pillarsNeedingRefinement.includes(p.id);
      const refinements = this._refinementByPillar.get(p.id) || [];
      const answeredRefinements = refinements.filter(rq => this._answers.has(rq.id)).length;
      if (this._phase === 'anchors') {
        brackets[p.id] = { score, lo: Math.max(100, score - 100), hi: Math.min(500, score + 100), status: 'anchor' };
      } else if (needsRefinement) {
        if (answeredRefinements >= refinements.length) {
          brackets[p.id] = { score, lo: score, hi: score, status: 'done' };
        } else {
          const spread = (refinements.length - answeredRefinements) > 1 ? 100 : 50;
          brackets[p.id] = { score, lo: Math.max(100, score - spread), hi: Math.min(500, score + spread), status: 'refining' };
        }
      } else {
        brackets[p.id] = { score, lo: score, hi: score, status: 'done' };
      }
    }
    return brackets;
  }

  _evaluateRefinement() {
    this._pillarsNeedingRefinement = [];
    for (let pid = 1; pid <= 5; pid++) {
      if (this._skippedPillars.has(pid)) continue;
      const targetLevel = this._targets[pid - 1];
      const anchorQ = this._anchorByPillar.get(pid);
      if (!anchorQ) continue;
      const anchorLevel = this._answers.get(anchorQ.id);
      if (anchorLevel === undefined) continue;
      // Fuzzy zone: within 100 points of target
      if (anchorLevel >= targetLevel - 100 && anchorLevel <= targetLevel) {
        this._pillarsNeedingRefinement.push(pid);
        const refinements = this._refinementByPillar.get(pid) || [];
        for (const rq of refinements) this._queue.push(rq.id);
      }
    }
    // Interleave RAI questions into refinement phase
    if (!this._raiQueued) {
      for (const rq of this._raiQuestions) this._queue.push(rq.id);
      this._raiQueued = true;
    }
    this._totalQuestions = this._answers.size + this._queue.length;
    this._phase = this._queue.length > 0 ? 'refinement' : 'complete';
  }

const $ = id => document.getElementById(id);
const content = () => $('content');

function roundTo50(v) {
  return Math.max(100, Math.min(500, Math.round(v / 50) * 50));
}

function transition(renderFn) {
  const c = content();
  c.classList.add('fade-out');
  setTimeout(() => {
    renderFn();
    c.classList.remove('fade-out');
    window.scrollTo({top: 0, behavior: 'smooth'});
  }, 350);
}

/* ============================================================

   ============================================================ */
const stepLabels = ['Discover','Assess','Results'];
function renderSteps() {
  const nav = $('steps-nav');
  let h = '';
  stepLabels.forEach((label, i) => {
    const phase = i + 1;
    let cls = '';
    if (phase < state.phase) cls = 'done';
    else if (phase === state.phase) cls = 'active';
    h += `<div class="step ${cls}"><div class="step-num">${phase}</div><span class="step-label">${label}</span></div>`;
    if (i < 2) h += `<div class="step-line ${phase < state.phase ? 'done' : ''}"></div>`;
  });
  nav.innerHTML = h;
}

function renderPhase1() {
  state.startedAt = Date.now();
  const q = dtQuestions[state.dtStep];
  let optsHtml = q.options.map((o, i) => {
    const pid = o.pattern || (o.next !== undefined ? null : null);
    const infoBtn = pid && patternExamples[pid]
      ? `<span class="dt-opt-info" onclick="event.stopPropagation(); toggleFlyout(${i})" title="See examples">?</span>`

window.toggleFlyout = function(idx) {
  const el = document.getElementById('flyout-' + idx);
  if (!el) return;
  const wasVisible = el.classList.contains('visible');
  document.querySelectorAll('.dt-flyout.visible').forEach(f => f.classList.remove('visible'));
  if (!wasVisible) el.classList.add('visible');
};

document.addEventListener('click', function(e) {
  if (!e.target.closest('.dt-opt-info') && !e.target.closest('.dt-flyout')) {
    document.querySelectorAll('.dt-flyout.visible').forEach(f => f.classList.remove('visible'));
  }
});

window.dtBack = function() {
  if (state.dtStep > 0) {
    state.dtStep = 0;
    transition(renderPhase1);
  }
};

window.dtSelect = function(i) {
  const q = dtQuestions[state.dtStep];
  const opt = q.options[i];
  if (opt.pattern) {
    state.suggestedPattern = opt.pattern;
    state.phase = 2;
    renderSteps();
    transition(renderPhase2);
  } else if (opt.next !== undefined) {
    state.dtStep = opt.next;
    transition(renderPhase1);
  }
};

/* ============================================================
   PHASE 3: ADAPTIVE BEHAVIORAL ASSESSMENT
   ============================================================ */
function renderPhase3() {
  if (!state.engine) return;

  // Check for phase transition message
  if (state.engine.didJustTransition()) {
    state.engine.clearTransition();
    content().innerHTML = `
      <div class="phase-transition">
        <h2>Great \u2014 we have a clear picture of the landscape</h2>
        <p>Based on your answers, we\u2019re diving deeper into a few areas where precision matters most for your goals.</p>
      </div>`;
    setTimeout(() => { transition(renderPhase3); }, 2200);
    return;
  }

  const q = state.engine.getNextQuestion();
  if (!q || state.engine.isComplete()) {
    state.phase = 4;
    renderSteps();
    const sb = document.getElementById('conv-sidebar');
    if (sb) sb.classList.remove('visible');
    transition(renderPhase4);
    return;
  }

  const progress = state.engine.getProgress();
  const p = progress.currentPillar;
  const phaseName = progress.phase === 'anchors' ? 'Discovery' : 'Deep Dive';
  const phaseClass = progress.phase === 'anchors' ? 'discovery' : 'deep-dive';
  const pct = progress.percentComplete;

  let optsHtml = q.options.map((o, oi) =>
    `<div class="opt-card ${state.selectedAnswer === o.level ? 'selected' : ''}" onclick="pickOpt('${q.id}',${o.level})">
       <div class="opt-marker"></div>
       <div>${o.text}</div>
     </div>`
  ).join('');

  const brackets = state.engine.getPillarBrackets();
  const targets = patternTargets[state.suggestedPattern]?.targets || [];
  const hasAnyAnswer = pillars.some(pl => brackets[pl.id].score !== null);

  let convHtml = '';
  // Scale header
  convHtml += '<div class="conv-scale"><div></div><div class="conv-scale-track">';
  for (let lvl = 100; lvl <= 500; lvl += 100) {
    convHtml += `<span style="left:${((lvl - 100) / 400) * 100}%">${lvl}</span>`;
  }
  convHtml += '</div></div>';
  // Pillar rows
  pillars.forEach((pl, i) => {
    const b = brackets[pl.id];
    const isActive = p && pl.id === p.id;
    const lo = ((b.lo - 100) / 400) * 100;
    const hi = ((b.hi - 100) / 400) * 100;
    const w = hi - lo;
    const targetPct = ((targets[i] - 100) / 400) * 100;
    let rangeClass = 'unknown';
    if (b.status === 'done') rangeClass = b.lo === b.hi ? 'locked' : 'narrowing';
    else if (b.status === 'anchor' || b.status === 'refining') rangeClass = 'narrowing';
    const pillarClass = isActive ? 'active-p' : (b.score !== null ? 'answered' : '');
    const rowClass = isActive ? 'active-row' : '';
    const isLocked = b.status === 'done' && b.lo === b.hi;
    const scorePct = b.score !== null ? ((b.score - 100) / 400) * 100 : 0;
    const dotHtml = isLocked ? `<div class="conv-dot" style="left:${scorePct}%"></div>` : '';
    convHtml += `<div class="conv-row ${rowClass}">
      <div class="conv-pillar ${pillarClass}">${pl.short}</div>
      <div class="conv-track">
        <div class="conv-range ${rangeClass}" style="left:${lo}%;width:${w}%"></div>
        ${dotHtml}
      </div>
    </div>`;
  });

  // Render sidebar
  let sidebar = document.getElementById('conv-sidebar');
  if (!sidebar) {
    sidebar = document.createElement('div');
    sidebar.id = 'conv-sidebar';
    sidebar.className = 'conv-sidebar';
    document.body.appendChild(sidebar);
  }
  sidebar.className = `conv-sidebar ${hasAnyAnswer ? 'visible' : ''}`;
  sidebar.innerHTML = `<div class="conv-sidebar-title">Maturity Range</div><div class="conv-strip">${convHtml}</div>`;

  content().innerHTML = `
    <div style="max-width:680px;margin:0 auto;">
      <div class="progress-wrap">
        <div class="progress-info">
          <span class="pillar-badge">${p ? p.short : ''}</span>
          <span class="phase-label ${phaseClass}">${phaseName}</span>
          <span class="progress-count">Question ${progress.answered + 1} of ~${progress.total}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="q-text">${q.text}</div>
      ${q.subtext ? `<div class="q-subtext">${q.subtext}</div>` : ''}
      <div class="options-list">${optsHtml}</div>
      <div class="q-nav">
        ${state.engine && state.engine.canUndo()
          ? '<button class="q-back" onclick="goBackQuestion()">← Back</button>'
          : '<a class="restart-link" onclick="restartAssessment()">Start assessment over</a>'}
        <button class="btn btn-primary" onclick="advanceQuestion()" ${state.selectedAnswer !== null ? '' : 'disabled'}>
          Next \u2192
        </button>
      </div>
    </div>`;
}

window.pickOpt = function(qId, level) {
  state.selectedAnswer = level;
  renderPhase3();
};

window.advanceQuestion = function() {
  if (state.selectedAnswer === null || !state.engine) return;
  const q = state.engine.getNextQuestion();
  if (!q) return;
  state.engine.recordAnswer(q.id, state.selectedAnswer);
  state.selectedAnswer = null;

  if (state.engine.isComplete()) {
    state.phase = 4;
    renderSteps();
    const sb = document.getElementById('conv-sidebar');
    if (sb) sb.classList.remove('visible');
    transition(renderPhase4);
  } else {
    transition(renderPhase3);
  }
};

window.goBackQuestion = function() {
  if (!state.engine || !state.engine.canUndo()) return;
  state.engine.undoLastAnswer();
  state.selectedAnswer = null;
  transition(renderPhase3);
};

window.restartAssessment = function() {
  state.phase = 2;
  state.engine = null;
  state.selectedAnswer = null;
  const sb = document.getElementById('conv-sidebar');
  if (sb) sb.classList.remove('visible');
  renderSteps();
  transition(renderPhase2);
};

/* ============================================================
   PHASE 4: RESULTS
   ============================================================ */
function renderPhase4() {
  const scoreMap = state.engine.getScores();
  const scores = pillars.map(p => scoreMap[p.id]);
  const targets = patternTargets[state.suggestedPattern]?.targets || null;
  const overall = roundTo50(scores.reduce((a,b)=>a+b,0) / scores.length);
  const overallName = levelNames[Math.min(500, Math.max(100, Math.round(overall/100)*100))];
  const patternName = patternTargets[state.suggestedPattern]?.name || '';
  const answeredCount = state.engine.getProgress().answered;

  // Log completion to Google Analytics (skip in demo mode)
  const raiScoreForGA = state.engine.getRaiScore();
  if (!state.isDemo) {
    gtag('event', 'assessment_complete', {
      pattern: patternName,
      pattern_id: state.suggestedPattern,
      overall_score: overall,
      overall_level: overallName,
      pillar_1_score: scores[0],
      pillar_2_score: scores[1],
      pillar_3_score: scores[2],
      pillar_4_score: scores[3],
      pillar_5_score: scores[4],
      rai_score: raiScoreForGA || 0,
      questions_answered: answeredCount,
      duration_seconds: state.startedAt ? Math.round((Date.now() - state.startedAt) / 1000) : 0
    });
  }

  // Build compact pillar status rows
  let pillarRows = pillars.map((p, i) => {
    const current = scores[i];
    const target = targets ? targets[i] : current;
    const gap = target - current;
    let statusCls, statusIcon;
    if (gap <= 0) { statusCls = 'on-track'; statusIcon = '✓'; }
    else if (gap <= 100) { statusCls = 'caution'; statusIcon = '→'; }
    else { statusCls = 'attention'; statusIcon = '↑'; }

    const targetLvl = Math.min(500, Math.max(200, Math.ceil(target / 100) * 100));
    const rec = gap <= 0
      ? "Maintain this strength"
      : (pillarRecs[p.id]?.[targetLvl] || pillarRecs[p.id]?.[Math.min(500, targetLvl + 100)] || "Strengthen this area");

    return `
      <div class="focus-pillar ${statusCls}">
        <div class="focus-pillar-header">
          <span class="focus-pillar-icon ${statusCls}">${statusIcon}</span>
          <span class="focus-pillar-name">${p.short}</span>
          <span class="focus-pillar-score">${current}</span>
          ${gap > 0 ? `<span class="focus-pillar-gap">→ ${target}</span>` : ''}
        </div>
        <div class="focus-pillar-rec">${rec}</div>
      </div>`;
  }).join('');

  // Build hero convergence chart (expanded version of sidebar)

  let heroConvHtml = '<div class="hero-conv"><div class="hero-conv-scale">';
  for (let lvl = 100; lvl <= 500; lvl += 100) {
    heroConvHtml += `<span style="left:${((lvl - 100) / 400) * 100}%">${lvl} · ${levelNames[lvl]}</span>`;
  }
  heroConvHtml += '</div>';
  pillars.forEach((pl, i) => {
    const current = scores[i];
    const target = targets ? targets[i] : current;
    const scorePct = ((current - 100) / 400) * 100;
    const targetPct = ((target - 100) / 400) * 100;
    const gap = target - current;
    let statusCls = gap <= 0 ? 'on-track' : (gap <= 100 ? 'caution' : 'attention');
    const gapHtml = gap > 0 ? `<div class="hero-conv-gap" style="left:${scorePct}%;width:${targetPct - scorePct}%"></div>` : '';
    const hasGap = gap > 0;
    const chevron = hasGap ? '<span class="hero-conv-chevron">▶</span>' : '';
    const rowCls = hasGap ? 'hero-conv-row has-gap' : 'hero-conv-row';
    const clickAttr = hasGap ? `onclick="toggleGapRow(this)"` : '';

    heroConvHtml += `<div class="${rowCls}" ${clickAttr}>
      <div class="hero-conv-pillar">${pl.name}${chevron}</div>
      <div class="hero-conv-track">
        ${gapHtml}
        <div class="hero-conv-target" style="left:${targetPct}%"></div>
        <div class="hero-conv-dot" style="left:${scorePct}%"></div>
      </div>
      <div class="hero-conv-val">${current}</div>
    </div>`;

    if (hasGap) {
      const acts = getNextActivities(pl.id, current);
      const resHtml = acts.map(a => `<a class="res-link">${a.icon} ${a.action}</a>`).join('');

  heroConvHtml += '<span class="hero-conv-legend-item"><span class="hero-conv-legend-dot"></span> Your score</span>';
  heroConvHtml += `<span class="hero-conv-legend-item"><span class="hero-conv-legend-target">★</span> ${patternName} target</span>`;
  heroConvHtml += '</div></div>';

  // Build action panel for gaps
  const gapPillars = pillars.map((pl, i) => ({
    pillar: pl, score: scores[i], target: targets ? targets[i] : scores[i], gap: (targets ? targets[i] : scores[i]) - scores[i]
  })).filter(g => g.gap > 0).sort((a, b) => b.gap - a.gap);

  let actionHtml = '';

  // Build RAI chip (ambient chip)

/* ============================================================
   PATTERN READINESS COMPUTATION
   ============================================================ */
function computeReadiness(scores, targets) {
  let totalGap = 0, pillarsReady = 0;
  for (let i = 0; i < scores.length; i++) {
    const gap = Math.max(0, targets[i] - scores[i]);
    totalGap += gap;
    if (gap <= 0) pillarsReady++;
  }
  const avgGap = totalGap / scores.length;
  if (pillarsReady === scores.length) return 4;
  if (avgGap <= 50) return 3;
  if (avgGap <= 150) return 2;
  return 1;
}

function buildExploreSection(scores, currentPatternId) {
  const colNames = COLUMNS;
  let html = '<div class="explore-section"><div class="explore-section-title">Explore Other Patterns</div><div class="explore-list">';

  for (const [id, pat] of Object.entries(patternTargets)) {
    const col = PATTERNS[id].column;
    const colClass = 'ecol-' + col;
    const isCurrent = String(id) === String(currentPatternId);
    const bars = computeReadiness(scores, pat.targets);

    let barsHtml = '';
    for (let b = 1; b <= 4; b++) {
      barsHtml += `<div class="explore-bar ${b <= bars ? 'efilled' : ''}"></div>`;
    }

    let convHtml = '';
    if (!isCurrent) {
      convHtml = '<div class="explore-conv-scale">';
      for (let lvl = 100; lvl <= 500; lvl += 100) {
        convHtml += `<span style="left:${((lvl - 100) / 400) * 100}%">${lvl}</span>`;
      }
      convHtml += '</div>';
      pillars.forEach((pl, i) => {
        const current = scores[i];
        const target = pat.targets[i];
        const gap = target - current;
        const scorePct = ((current - 100) / 400) * 100;
        const targetPct = ((target - 100) / 400) * 100;
        const gapHtml = gap > 0
          ? `<div class="explore-conv-gap" style="left:${scorePct}%;width:${targetPct - scorePct}%"></div>`
          : '';
        convHtml += `<div class="explore-conv-row">
          <div class="explore-conv-name">${pl.short}</div>
          <div class="explore-conv-track">
            ${gapHtml}
            <div class="explore-conv-target" style="left:${targetPct}%"></div>
            <div class="explore-conv-dot" style="left:${scorePct}%"></div>
          </div>
          <div class="explore-conv-val">${current}</div>
        </div>`;
      });
      convHtml += '<div class="explore-conv-legend">';
      convHtml += '<span class="explore-conv-legend-item"><span class="explore-conv-legend-dot"></span> Your score</span>';
      convHtml += `<span class="explore-conv-legend-item"><span class="explore-conv-legend-star">★</span> ${pat.name} target</span>`;
      convHtml += '</div>';
    }

    const cardCls = `explore-card ${colClass}${isCurrent ? ' explore-current' : ''}`;
    const clickAttr = isCurrent ? '' : `onclick="toggleExploreCard(this)"`;
    const rightSide = isCurrent
      ? '<span class="explore-current-tag">Currently viewing</span>'
      : `<div class="explore-bars">${barsHtml}</div><span class="explore-chevron">▶</span>`;

    const detailInner = isCurrent ? '' : `
      <div class="explore-detail">
        <div class="explore-detail-inner">
          <div class="explore-scenario">\u201C${scenarios[id]}\u201D</div>
          ${convHtml}
          <button class="explore-view-btn" onclick="event.stopPropagation(); switchPattern(${id})">View Full Analysis →</button>
        </div>
      </div>`;

    html += `<div class="${cardCls}" ${clickAttr}>
      <div class="explore-card-top">
        <span class="explore-num">${id}</span>
        <div class="explore-info">
          <div class="explore-name">${pat.name}</div>
          <div class="explore-column-tag">${colNames[col]}</div>
        </div>
        ${rightSide}
      </div>
      ${detailInner}
    </div>`;
  }

  html += '</div></div>';
  return html;
}

/* ============================================================
   JOURNEY LADDER (SVG)
   ============================================================ */
function renderLadder(scores, targets) {
  const W = 900, H = 500;
  const M = {t:35, r:25, b:70, l:85};
  const UW = W - M.l - M.r;
  const UH = H - M.t - M.b;
  const CW = UW / 8;

  const lY = lvl => M.t + UH * (1 - (lvl - 100) / 400);
  const pX = i => M.l + CW * (i + 0.5);

  let s = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px" xmlns="http://www.w3.org/2000/svg">`;

  // Background
  s += `<rect x="${M.l}" y="${M.t}" width="${UW}" height="${UH}" fill="#0e1117" rx="4"/>`;

  // Horizontal grid lines + level labels
  for (let lvl = 100; lvl <= 500; lvl += 100) {
    const y = lY(lvl);
    s += `<line x1="${M.l}" y1="${y}" x2="${M.l+UW}" y2="${y}" stroke="#2a3040" stroke-width="1"/>`;
    s += `<text x="${M.l-12}" y="${y+1}" text-anchor="end" fill="#8b949e" font-size="12" font-family="DM Sans,sans-serif" dominant-baseline="middle">${lvl}</text>`;
    s += `<text x="${M.l-12}" y="${y+14}" text-anchor="end" fill="#656d76" font-size="9" font-family="DM Sans,sans-serif">${levelNames[lvl]}</text>`;
  }

  // Vertical dividers
  for (let i = 1; i < 8; i++) {
    const x = M.l + CW * i;
    s += `<line x1="${x}" y1="${M.t}" x2="${x}" y2="${M.t+UH}" stroke="#2a3040" stroke-width="0.5"/>`;
  }

  // Pillar labels
  pillars.forEach((p, i) => {
    const x = pX(i);
    s += `<text x="${x}" y="${M.t+UH+22}" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600" font-family="DM Sans,sans-serif">${p.short}</text>`;
  });

  // Data markers per pillar
  pillars.forEach((p, i) => {
    const cx = pX(i);
    const cur = scores[i];
    const curY = lY(cur);
    const tgt = targets ? targets[i] : null;

    // Connecting line from current to target
    if (tgt !== null && tgt > cur) {
      s += `<line x1="${cx}" y1="${curY}" x2="${cx}" y2="${lY(tgt)}" stroke="#f0f0f0" stroke-width="1.5" stroke-dasharray="3 3" stroke-linecap="round"/>`;
    }

    // Target (white diamond)
    if (tgt !== null) {
      const ty = lY(tgt);
      s += `<rect x="${cx-7}" y="${ty-7}" width="14" height="14" fill="none" stroke="#f0f0f0" stroke-width="2" transform="rotate(45 ${cx} ${ty})">
        <title>Target: ${tgt}</title></rect>`;
    }

    // Assessed current (filled blue circle)
    s += `<circle cx="${cx}" cy="${curY}" r="9" fill="#4393e5">
      <title>${p.short}: ${cur}</title></circle>`;
    s += `<text x="${cx}" y="${curY + 1}" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="DM Sans,sans-serif" dominant-baseline="middle">${cur}</text>`;
  });

  s += '</svg>';
  $('ladder-svg').innerHTML = s;
}

/* ============================================================
   RADAR CHART (Chart.js)
   ============================================================ */
function renderRadar(scores, targets) {
  const ctx = $('radar-canvas').getContext('2d');
  const datasets = [
    {
      label: 'Your Assessment',
      data: scores,
      borderColor: '#4393e5',
      backgroundColor: 'rgba(67,147,229,0.08)',
      borderWidth: 2,
      pointStyle: 'circle',
      pointRadius: 5,
      pointBackgroundColor: '#4393e5',
      pointBorderColor: '#4393e5'
    }
  ];

  if (targets) {
    datasets.push({
      label: 'Target',
      data: targets,
      borderColor: '#f0f0f0',
      backgroundColor: 'transparent',
      borderWidth: 2,
      borderDash: [3, 3],
      pointStyle: 'rectRot',
      pointRadius: 6,
      pointBackgroundColor: 'transparent',
      pointBorderColor: '#f0f0f0',
      pointBorderWidth: 2
    });
  }

  new Chart(ctx, {
    type: 'radar',
    data: {
      labels: pillars.map(p => p.short),
      datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: {
        r: {
          min: 0,
          max: 500,
          ticks: {stepSize:100, color:'#656d76', backdropColor:'transparent', font:{family:'DM Sans'}},
          grid: {color:'#2a3040'},
          angleLines: {color:'#2a3040'},
          pointLabels: {color:'#e6edf3', font:{family:'DM Sans', size:11, weight:'600'}}
        }
      },
      plugins: {
        legend: {
          labels: {
            color:'#e6edf3',
            font:{family:'DM Sans', size:12},
            usePointStyle: true,
            padding: 20
          }
        }
      }
    }
  });
}

  const container = document.createElement('div');
  container.style.cssText = 'position:absolute;left:0;top:0;z-index:-9999;opacity:0;overflow:hidden;width:794px';
  container.innerHTML = pdfHtml;
  document.body.appendChild(container);

  // Show generating feedback on the button
  const btn = document.querySelector('[onclick="downloadPDF()"]');
  const origLabel = btn ? btn.innerHTML : '';
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px;animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="12"/></svg>Generating PDF\u2026';
  }

  html2pdf().set({
    margin: 0,
    filename: 'AdoptionPulse-Assessment.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff', width: 794, scrollX: 0, scrollY: 0 },
    jsPDF: { unit: 'px', format: [794, 1122], orientation: 'portrait', hotfixes: ['px_scaling'] },
    pagebreak: { mode: ['css'] }
  }).from(container.firstElementChild).save().then(() => {
    document.body.removeChild(container);
    if (btn) { btn.disabled = false; btn.innerHTML = origLabel; }
  }).catch((err) => {
    console.error('PDF generation failed:', err);
    document.body.removeChild(container);
    if (btn) { btn.disabled = false; btn.innerHTML = origLabel; }
    alert('PDF generation failed. Please try again or check the browser console for details.');
  });

  } catch (err) {
    console.error('PDF download error:', err);
    alert('PDF generation failed: ' + err.message);
  }
};
